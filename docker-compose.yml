services:
  collector:
    image: ghcr.io/hoopec/miio-monitor:latest
    container_name: miio-collector
    command: ["python", "collector.py"]
    environment:
      - TZ=Asia/Shanghai
      - DB_PATH=/app/data/data.db
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
    network_mode: host
    restart: unless-stopped

  web:
    image: ghcr.io/hoopec/miio-monitor:latest
    container_name: miio-web
    command: ["python", "web_server.py"]
    environment:
      - TZ=Asia/Shanghai
      - DB_PATH=/app/data/data.db
    ports:
      - "5000:5000"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
    depends_on:
      - collector
    restart: unless-stopped
